apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: "654654229415.dkr.ecr.us-east-1.amazonaws.com/taskflow-frontend:latest"
          ports:
            - containerPort: 80
