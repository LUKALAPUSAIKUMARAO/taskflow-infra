apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskflow-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/LUKALAPUSAIKUMARAO/taskflow-infra.git
    targetRevision: main
    path: helm-charts/frontend/frontend
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
